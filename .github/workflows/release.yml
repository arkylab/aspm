name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          strip aspm || true
          chmod +x aspm

      - name: Prepare binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../aspm-${{ matrix.target }}.tar.gz aspm

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../aspm-${{ matrix.target }}.zip aspm.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aspm-${{ matrix.target }}
          path: aspm-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ github.ref_name }}
          cat << EOF > release-notes.md
          ## aspm ${VERSION}

          ### Installation

          **Linux / macOS:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/arkylab/aspm/main/scripts/install.sh | sh
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          irm https://raw.githubusercontent.com/arkylab/aspm/main/scripts/install.ps1 | iex
          \`\`\`

          ### Downloads

          | Platform | Architecture | Download |
          |----------|-------------|----------|
          | Linux | x64 | \`aspm-x86_64-unknown-linux-gnu.tar.gz\` |
          | Linux | ARM64 | \`aspm-aarch64-unknown-linux-gnu.tar.gz\` |
          | macOS | Intel | \`aspm-x86_64-apple-darwin.tar.gz\` |
          | macOS | Apple Silicon | \`aspm-aarch64-apple-darwin.tar.gz\` |
          | Windows | x64 | \`aspm-x86_64-pc-windows-msvc.zip\` |
          | Windows | ARM64 | \`aspm-aarch64-pc-windows-msvc.zip\` |
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
